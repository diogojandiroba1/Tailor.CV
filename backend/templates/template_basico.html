<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; line-height: 1.5; margin: 0; padding: 40px; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; font-size: 24px; }
        h2 { color: #2980b9; margin-top: 25px; border-bottom: 1px solid #bdc3c7; padding-bottom: 5px; font-size: 18px; }
        .section { margin-bottom: 20px; }
        ul { margin-top: 10px; padding-left: 20px; }
        li { margin-bottom: 8px; text-align: justify; }
    </style>
</head>
<body>
    <h1>{{ nome_candidato }}</h1>
    
    <div class="section">
        <h2>Resumo Profissional</h2>
        <p>{{ resumo }}</p>
    </div>

    <div class="section">
        <h2>Experiência Profissional</h2>
        <ul>
        {% for exp in experiencias %}
            <li>{{ exp }}</li>
        {% endfor %}
        </ul>
    </div>

    <div class="section">
        <h2>Habilidades</h2>
        <ul>
        {% for hab in habilidades %}
            <li>{{ hab }}</li>
        {% endfor %}
        </ul>
    </div>
</body>
</html>
